<svg viewBox="0 0 880 280" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Fondo principal -->
  <rect width="880" height="280" fill="#002855"/>
  <!-- Franja inferior -->
  <rect x="0" y="224" width="880" height="56" fill="#001A3A"/>
  <!-- Barra lateral oro -->
  <rect x="0" y="0" width="7" height="280" fill="#C9A84C"/>
  <rect x="7" y="0" width="3" height="280" fill="#A8873A" opacity="0.5"/>
  <!-- Decoración esquina superior derecha -->
  <rect x="820" y="22" width="44" height="2" fill="#C9A84C" opacity="0.4"/>
  <rect x="856" y="22" width="2" height="44" fill="#C9A84C" opacity="0.4"/>
  <!-- Decoración esquina inferior derecha -->
  <rect x="820" y="256" width="44" height="2" fill="#C9A84C" opacity="0.2"/>
  <rect x="820" y="214" width="2" height="44" fill="#C9A84C" opacity="0.2"/>
  <!-- Logo UNAM (base64 embebido) -->
  <image href="data:image/jpeg;base64," x="790" y="16" width="72" height="72" preserveAspectRatio="xMidYMid meet"/>
  <!-- Institución -->
  <text x="38" y="58" font-family="Georgia, serif" font-size="12" fill="#C9A84C" letter-spacing="3">FACULTAD DE CIENCIAS · UNAM · 2026</text>
  <!-- Programa -->
  <text x="38" y="82" font-family="Georgia, serif" font-size="12" fill="#E8D5A0" letter-spacing="2" opacity="0.85">MÉTODOS CUANTITATIVOS PARA FINANZAS</text>
  <!-- Línea separadora -->
  <rect x="38" y="96" width="60" height="1.5" fill="#C9A84C" opacity="0.6"/>
